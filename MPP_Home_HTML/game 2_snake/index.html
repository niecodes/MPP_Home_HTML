<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== LANDING PAGE ===== -->
<div id="landing" class="card">
  <h1>Snake Game 🐍( ˶°ㅁ°) !!</h1>

  <input type="text" id="playerName" placeholder="Insert Name">

  <button onclick="startGame()">Start Game</button>

  <h3>📊 Score History ⭐</h3>
  <ul id="scoreHistory"></ul>

  <button class="danger" onclick="resetHistory()">Reset History ↺</button>
</div>

<!-- ===== GAME PAGE ===== -->
<div id="gamePage" style="display:none; position:relative;">
  <p>Player: <b id="playerLabel"></b></p>
  <p>Skor: <span id="score">0</span></p>

  <canvas id="gameCanvas" width="300" height="300"></canvas>

  <!-- KONTROL DI BAWAH -->
  <div class="controls bottom-circle">
    <button onclick="setDirection('UP')">⬆</button>
    <div>
      <button onclick="setDirection('LEFT')">⬅</button>
      <button onclick="setDirection('RIGHT')">➡</button>
    </div>
    <button onclick="setDirection('DOWN')">⬇</button>
  </div>
</div>

<!-- ===== SOUND EFFECT & BGM ===== -->
<audio id="eatSound" src="eat.wav"></audio>
<audio id="gameOverSound" src="gameover.mp3"></audio>
<audio id="startSound" src="start.mp3"></audio>
<audio id="bgm" src="bgm.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
